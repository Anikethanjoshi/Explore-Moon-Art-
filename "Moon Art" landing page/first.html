<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Moon Art</title>
    <link rel="stylesheet" href="first.css">
</head>
<body>
    
    <div class="bg-fullscreen"></div>

    <div class="container">

        <audio id="space-music" loop>
            <source src="audio.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <button id="music-toggle" class="music-btn">🎵 Play Music</button>
        
        <section class="content">
            <h1>EXPLORE <br> MOON ART</h1>
            <p>Some beautiful moon art without getting modularity.</p>
            <button class="btn">SEE MORE</button>
        </section>

        <section class="slider">
            <div class="card active" style="--img: url('thumbnails/img1.jpeg')"></div>
            <div class="card" style="--img: url('thumbnails/img2.jpeg')"></div>
            <div class="card" style="--img: url('thumbnails/img3.jpeg')"></div>
            <div class="card" style="--img: url('thumbnails/img4.jpeg')"></div>
        </section>
        
        <div class="nav-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

    </div>

    <script src="first.js"></script>
</body>
</html>
